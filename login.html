<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        font-family: sans-serif;
        color: #000000;
        font-size: 16px;
        background-color: #F1F3F4;
    }
    #container{
        width: 615px;
        height: 730px;
        margin-top: 137px;
        margin-left: 413px;
        border-radius: 30px;
        border: 1px solid #F1F3F4;
        background-color: #FBFBFF;
        box-shadow: 0px -5px 4px 0px #4ECDC4;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    h2{
        font-size: 32px;
        margin-bottom: 7px;
        margin-top: 90px;
    }
    .lab{
        font-size: 16px;
        margin-top: 0px;
        margin-left: 13px;
        font-weight: bold;
    }
    .mail{
       width: 460px;
       height: 56.04px;
       padding-left: 30px;
       border-radius: 15px;
       border: 1px solid #4ECDC4;
       background-color: #F1F3F4;
       margin-top: 10px;
    }
    #pass{
        text-align: left;
        margin-right: 150px;
    }
    .forgot{
        margin-top: 12px;
        margin-right: 0px;
        margin-bottom: 20px;
        display: flex;
        justify-content: space-between;
    }
    .btn{
        background-color: #4ECDC4;
        border: 1px solid #4ECDC4;
        width: 491px;
        height: 56.04px;
        border-radius: 15px;
        font-size: 16px;
        font-weight: 700;
        color: #FBFBFF;
    }
    .crt{
        margin-right: 140px;
    }
    a{
        text-decoration: none;
        color: #4ECDC4;
    }
</style>
<body>
    <form onsubmit="scr()">
        <div id="container">
        <h2>Welcome Back</h2>
        <p style="margin: 0px;">Sign in to continue to your dashboard</p>
        <div style="margin-bottom: 40px;margin-top: 70px;">
            <label for="" class="lab">Email Address:</label>
            <br>
            <input class="mail" id="mail" type="email" placeholder="Enter your email address">
        </div>
        <div style="margin-bottom: 5px;">
            <label for=""  class="lab">Password:</label>
            <br>
            <input class="mail" id="password" type="password" placeholder="Enter your password">
        </div>
        
        <p id="pass">Password must be 6 at least characters long.</p>
        <div class="forgot">
            <input id="check" type="checkbox">
            <p> Remember me for 30 days</p>
            <p style="margin-left: 140px;"><a href="">Forgot password?</a></p>
        </div>
        <button class="btn" type="submit">Sign in</button>
        <p class="crt">New to WebTech practice? <a href="./signup.html">Create an acount</a></p>
    </div>
    </form>

    <script>
        function scr(){
            let x=document.getElementById("mail").value;
            let y=document.getElementById("password").value;
            if(x==""||y==""){
                alert("All fields are mandatory");
                return false;
            }
            else if(y.length<6){
                alert("passwort must be of atleast 6 character");
                return false;
            }
            else{
                alert("Logged in successfully");
            }

        }
    </script>
</body>
</html>
