</head>
<body>
    <div id="left">
        <div id="profile">
            <div id="picture">
                <p>DU</p>
            </div>
            <div id="user">
                <p><b>Demo User</b></p>
                <p>demo@webtech.practice</p>
            </div>
        </div>
        <br>
        <hr style="color: #4ECDC4;">
        <p class="navtitle"> DASHBOARD</p>
        <div class="dashcontx"><p><a href="../dashboard/dashboard.html">Overview</a></p></div>
        <div class="dashcont"><p><a href="../profile setting/Profile setting.html">Profile Settings</a></p></div>
        <div class="dashcontx"><p><a href="../security settings/security.html">Security</a></p></div>
        <div class="dashcontx"><p><a href="../notifications/Notificaton.html">Notification</a></p></div>
        <p class="navtitle"> QUICK ACTION</a></p>
        <div class="dashcontx"><p><a href="../help&support/help.html">Help & Support</a></p></div>
        <br><br><br><br>
        <p class="navtitle"> ACCOUNT</p>
        <div class="dashcontx"><p><a href="../landing page/landing page.html">Sign out</a></p></div>
    </div>
    <div id="right">
        <h2 id="header">WebTech Practice Dashboard</h2>
        <div id="content">
            <h2>Profile Settings</h2>
            <h3>Personal information</h3>
            <div id="topcont">
                <div class="inp13">
                    <label for="">Full Name</label>
                    <br>
                    <input type="text" placeholder="Demo User">
                </div>
                <div>
                    <label for="">Date of Birth</label>
                    <br>
                    <input type="date" placeholder="dd-mm-yy">
                </div>
                <div class="inp13">
                    <label for="">Email Address</label>
                    <br>
                    <input type="email" placeholder="demo@gmail.com">
                </div>
                <div>
                    <label for="">Phone Number</label>
                    <br>
                    <input type="tel" placeholder="9876543210" pattern="[0-9]{10}">
                </div>
            </div>
            
            <h3>Address Information</h3>
            <div id="bottomcont">
                <div class="street" style="width: 100%;">
                    <label for="">Street Address</label>
                    <br>
                    <input type="text" placeholder="Enter your complete address">
                </div>
                <div class="inp13">
                    <label for="">PIN Code</label>
                    <br>
                    <input type="number" placeholder="123456">
                </div>
                <div>
                    <label for="">City</label>
                    <br>
                    <input type="text" placeholder="Ranchi">
                </div>
                <div class="inp13">
                    <label for="">Country</label>
                    <br>
                    <input type="text" placeholder="India">
                </div>
                <div>
                    <label for="">Github Profile</label>
                    <br>
                    <input type="url" placeholder="https:/github/hgdfhgj/jkhkjh.git">
                </div>
            </div>
            <div id="btn">
                <button class="btn1">Save changes</button>
                <button class="btn2">Cancel changes</button>
            </div>
        </div>
    </div>
</body>
</html>
